# --------------------------------------------------------------------------
# 1. C/CXX FLAGS
# --------------------------------------------------------------------------
CFLAGS="-march=raptorlake -O3 -flto=20 -pipe"
CXXFLAGS="${CFLAGS}"
FCFLAGS="${CFLAGS}"
FFLAGS="${CFLAGS}"

RUSTFLAGS="-C target-cpu=raptorlake -C opt-level=3"

# --------------------------------------------------------------------------
# 2. Parallelism
# --------------------------------------------------------------------------
MAKEOPTS="-j20 -l16"
EMERGE_DEFAULT_OPTS="--jobs 4 --load-average=18 --with-bdeps=y --complete-graph=y"
EMERGE_NICENESS=19
# --------------------------------------------------------------------------
# 3. USE Flags
# --------------------------------------------------------------------------
USE="grub dbus udev policykit crypt cgroups pam"
USE="${USE} -elogind -systemd seatd builtin-libseat"
USE="${USE} X xft qt5 qt6 gtk wayland -vulkan"
USE="${USE} cups bluetooth"
USE="${USE} pipewire jack alsa midi realtime threadsafe opus aac mp3 flac vorbis networkmanager"
USE="${USE} egl gles2 screencast libinput opengl vulkan opencl intel"
USE="${USE} modules-sign man secureboot"
USE="${USE} cli verify-sig unicode ipc native-symlinks"

ABI_X86="64"

CPU_FLAGS_X86="aes avx avx2 avx_vnni bmi1 bmi2 f16c fma3 mmx mmxext pclmul popcnt rdrand sha sse sse2 sse3 sse4_1 sse4_2 ssse3 vpclmulqdq"

GRUB_PLATFORMS="efi-64"

MODULES_SIGN_KEY="/kernel_key.pem"
MODULES_SIGN_HASH="sha512"

SECUREBOOT_SIGN_KEY="/etc/secureboot/db.key"
SECUREBOOT_SIGN_CERT="/etc/secureboot/db.crt"
# --------------------------------------------------------------------------
# 4. Portage Specific Variables
# --------------------------------------------------------------------------
VIDEO_CARDS="intel iris"
INPUT_DEVICES="libinput"
LINGUAS="en tr"
L10N="en tr"

# --------------------------------------------------------------------------
# 5. Portage Features
# --------------------------------------------------------------------------
FEATURES="ccache parallel-fetch collision-protect candy"
CCACHE_DIR="/var/cache/ccache"
CCACHE_SIZE="20G"
PORTAGE_TMPDIR="/var/tmp/portage"
PORTAGE_ELOG_CLASSES="warn error log"
PORTAGE_ELOG_SYSTEM="save"
PORTAGE_COMPRESS="zstd"
PORTAGE_COMPRESS_FLAGS="-19"
GOAMD64="v4"

# --------------------------------------------------------------------------
# 6. ACCEPT_LICENSE
# --------------------------------------------------------------------------
ACCEPT_KEYWORDS="~amd64"
ACCEPT_LICENSE="*"

