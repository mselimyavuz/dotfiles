;==========================================================
; ~/.config/polybar/config.ini
;==========================================================

[colors]
background = #001e1e2e
background-alt = #00313244
background-light = #0045475a
foreground = #cdd6f4
gentoo-purple = #7b5da7
orange = #fab387
green = #a6e3a1
magenta = #cba6f7
blue = #89b4fa
red = #f38ba8
gray = #585b70

[bar/main]
monitor = ${env:MONITOR:eDP-1}
width = 100%
height = 32pt
radius = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt
border-size = 0
padding-left = 1
padding-right = 1
module-margin = 1

font-0 = "IosevkaTerm Nerd Font Mono:size=18;3"
font-1 = "Symbols Nerd Font:size=18;3"

modules-left = i3 weather music
modules-center = date
modules-right = tray pulseaudio bluetooth network backlight cpu memory disk zram battery

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true
wm-restack = i3
override-redirect = false

;==========================================================
; MODULES
;==========================================================

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
index-sort = true

label-focused = %index%
label-focused-background = ${colors.orange}
label-focused-foreground = ${colors.gentoo-purple}
label-focused-underline= ${colors.gentoo-purple}
label-focused-padding = 1

label-unfocused = %index%
label-unfocused-padding = 1

label-urgent = %index%
label-urgent-background = ${colors.red}
label-urgent-padding = 1

label-mode = %mode%
label-mode-background = ${colors.gentoo-purple}
label-mode-padding = 1

[module/weather]
type = custom/script
exec = ~/.local/bin/weather.sh
interval = 600
format-background = ${colors.background-light}
format-foreground = ${colors.blue}
format-padding = 1

[module/music]
type = custom/script
exec = playerctl metadata --format '{{ artist }} - {{ title }}'
interval = 2
format-prefix = "󰎆 "
format-background = ${colors.background-light}
format-foreground = ${colors.magenta}
format-padding = 1

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "󰕾 "
format-volume = <label-volume>
label-volume = %percentage%%
label-muted = "󰝟 muted"
label-muted-foreground = ${colors.gray}
format-volume-foreground = ${colors.gentoo-purple}
click-right = pavucontrol &

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "󰻠"
format-foreground = ${colors.green}
format-background = ${colors.background-light}
label = %percentage:2%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "󰍛"
format-foreground = ${colors.blue}
format-background = ${colors.background-light}
label = %percentage_used:2%%

[module/zram]
type = custom/script
exec = free | grep -i Swap | awk '{if ($2 > 0) printf "%.0f%%", ($3/$2)*100; else print "0%"}'
interval = 5
format-prefix = "󰓅"
format-foreground = ${colors.magenta}
format-background = ${colors.background-light}

[module/battery]
type = internal/battery
full-at = 99
battery = BAT0
adapter = AC
format-charging = <animation-charging> <label-charging>
format-charging-background = ${colors.green}
format-charging-foreground = ${colors.foreground}
format-discharging = <ramp-capacity> <label-discharging>
format-discharging-background = ${colors.background-light}
format-discharging-foreground = ${colors.orange}

ramp-capacity-0 = 󰁺
ramp-capacity-1 = 󰁼
ramp-capacity-2 = 󰁾
ramp-capacity-3 = 󰂀
ramp-capacity-4 = 󰁹

animation-charging-0 = 󰂆
animation-charging-1 = 󰂈
animation-charging-2 = 󰂉
animation-charging-3 = 󰂊
animation-charging-4 = 󰂅
animation-charging-framerate = 750

[module/bluetooth]
type = custom/script
exec = ~/.local/bin/bluetooth.sh
interval = 5
click-left = blueman-manager &
format-padding = 1
format-background = ${colors.background-light}
format-foreground = ${colors.blue}

[module/network]
type = internal/network
interface = wlan0
interval = 3.0
format-connected = <label-connected>
format-connected-background = ${colors.background-light}
format-connected-padding = 1
label-connected = "󰖩 %essid%"
label-disconnected = "󰖪 "
format-connected-foreground = ${colors.green}

[module/backlight]
type = internal/backlight
card = intel_backlight
use-actual-brightness = true
format = <label>
format-prefix = "󰃠"
format-background = ${colors.background-light}
format-foreground = ${colors.orange}
format-padding = 1
label = %percentage%%

[module/disk]
type = internal/fs
mount-0 = /
interval = 30
fixed-values = true
format-mounted = <label-mounted>
format-mounted-prefix = "󰋊"
format-mounted-background = ${colors.background-light}
format-mounted-foreground = ${colors.orange}
format-mounted-padding = 1
label-mounted = %percentage_used%%

[module/date]
type = internal/date
interval = 1
date = %Y-%m-%d %I:%M %p
format-foreground = ${colors.foreground}
format-background = ${colors.background}
format-padding = 1

[module/tray]
type = internal/tray
tray-position = right
tray-padding = 4
tray-size = 55%
tray-spacing = 8px
tray-background = ${colors.background}

[settings]
screenchange-reload = true
pseudo-transparency = true

