# ==============================================================================
# ~/.tmux.conf
# ==============================================================================

# ====================
# BASIC SETTINGS
# ====================
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000

setw -g monitor-activity on
set -g visual-activity off

# ====================
# KEY BINDINGS
# ====================
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind -n M-Left previous-window
bind -n M-Right next-window

setw -g mode-keys vi
set -s set-clipboard on
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi r send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"

# ====================
# CUSTOM GENTOO MONITORING
# ====================
bind G new-window -n "portage-watch" "watch -c -n 5 'emlop predict --duration human --header --color yes'" \; \
       split-window -v -p 35 "watch -n 5 'zramctl; echo; swapon --show'" \; \
       select-pane -t 1

# ====================
# DESIGN & STATUS BAR (Gruvbox Dark)
# ====================
set -g status-position bottom
set -g status-interval 1
set -g status-justify left

set -g status-style "bg=#282828,fg=#ebdbb2"
set -g message-style "bg=#fe8019,fg=#282828"
set -g pane-border-style "fg=#504945"
set -g pane-active-border-style "fg=#fe8019"

set -g status-left-length 40
set -g status-left "#[fg=#282828,bg=#98971a,bold] #S #[fg=#98971a,bg=#3c3836]#[fg=#a89984,bg=#3c3836] #(whoami)@#h #[fg=#3c3836,bg=#282828] "

set -g status-right-length 150
set -g status-right "#(sh ~/.tmux/scripts/status_right.sh) #[fg=#504945,bg=#3c3836] #[fg=#a89984,bg=#504945] 📅 %Y-%m-%d %a #[fg=#98971a,bg=#504945]#[fg=#282828,bg=#98971a,bold] ⏰%I:%M:%S %p "

setw -g window-status-separator ""
setw -g window-status-style "fg=#bdae93,bg=#282828"
setw -g window-status-current-style "fg=#282828,bg=#fe8019,bold"
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "

# ====================
# PLUGIN MANAGER (TPM)
# ====================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'

set -g default-terminal "tmux-256color"
set -s escape-time 10

